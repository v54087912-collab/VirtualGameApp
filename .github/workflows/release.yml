name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          
      - name: Make gradlew executable
        run: chmod +x gradlew
        
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
            
      - name: Skip cargo build (no Rust toolchain needed)
        run: |
          sed -i '/^task cargoBuild/,/^}/d' app/build.gradle
          sed -i '/^tasks.whenTaskAdded/,/^}/d' app/build.gradle
          echo "Cargo build task removed"
          grep -n "cargoBuild\|whenTaskAdded" app/build.gradle || echo "Verified: no cargo references remain"
          
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        
      - name: Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
